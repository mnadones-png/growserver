services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "pnpm run setup && pnpm dev"
    network_mode: "host"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://growserver:ilovereimu@127.0.0.1:5433/growserver
      - JWT_SECRET=4f7b2c9a1d8e6f3a0b5c8d7e1f4a9b6c3d0e2f5a8b7c9d0e1f3a2b4c5d6e7f8a
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - NODE_ENV=development
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: growserver
      POSTGRES_PASSWORD: ilovereimu
      POSTGRES_DB: growserver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/var/lib/redis/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
