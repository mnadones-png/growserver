services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "pnpm run setup && pnpm dev"
    ports:
      - "8083:8080"
      - "8084:8081"
      - "4443:443"
      - "17091:17091/udp"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - NODE_ENV=development
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: growserver
      POSTGRES_PASSWORD: ilovereimu
      POSTGRES_DB: growserver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/var/lib/redis/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
